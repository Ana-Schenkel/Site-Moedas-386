<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - EcoCoins</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body{
            background-image: url('Imagens/fundo12.svg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div class="logo-text" style="margin: 12px 30px;">386 <span style="color: #0056b3;">EcoCoin</span></div>
    
    <section class="acesso">
        <h1>Cadastre-se no Moeda Escolar</h1>
        
        <section class="area-cadastro">
            <div class="cadastrar">
                <ul>
                    <li><input type="text" id="nome" placeholder="Nome Completo" required></li>
                    <li><input type="number" id="matricula" placeholder="Matrícula" required></li>
                    <li><input type="email" id="email" placeholder="E-mail" required></li>
                    <li><input type="password" id="senha" placeholder="Senha (mínimo 6 caracteres)" required></li>
                    <li><input type="password" id="confsenha" placeholder="Confirmar senha" required></li>
                    <li><input type="submit" value="Cadastrar-se" style="margin-top: 15px;"></li>
                </ul>
            </div>
            <div class="redes">
                <p style="padding: 13px 0;">Já tem uma conta? <a href="login.html" style="text-decoration: underline; color: var(--primary-dark);">Faça login</a></p>
            </div>
            <div class="redes" style="border-top: 1px solid rgb(255, 255, 255); padding-top: 13px; "> Google | Facebook
            </div>
        </section>
    </section>
    
</body>
</html>
