<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - EcoCoins</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body{
            background-image: url('Imagens/fundo12.svg');;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div class="logo-text" style="margin:12px 30px;">386 <span style="color: #0056b3;">EcoCoin</span></div>
    
    <div class="acesso">
        <h1>Acesse sua conta</h1>
        
        <section class="area-cadastro">
            <div class="redes" style="border-bottom: 1px solid rgb(255, 255, 255); padding-bottom: 20px; ">
                <ul>
                    <li><button class="btn-entrar" style="background-color: white; margin-top: -10px;">Entrar com Google</button></li> <!-- colocar como opção login por meio do google -->
                    <li><button class="btn-entrar" style="background-color: var(--primary-dark); color: white;">Entrar com Facebook</button></li> <!-- colocar como opção login por meio do facebook -->
                </ul>
            </div>
            <div class="cadastrar" style="margin-top: 20px;">
                <ul>
                    <li><input type="email" id="email" placeholder="E-mail" required></li>
                    <li><input type="password" id="senha" placeholder="Senha" required></li>
                    <li><input type="submit" value="Entrar"></li>
                    <li><input type="submit" value="Esqueceu a senha?" style="background-color: #0360c4ad;"></li>
                </ul>
            </div>
        </section>
    </div>
    
</body>
</html>
