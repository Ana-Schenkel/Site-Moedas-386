<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - EcoCoins</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body{
            background-image: url('Imagens/fundo12.svg');;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }
    </style>
    <script src="script_login_perfil.js"></script>
</head>
<body id="pagina_login">

    <div class="logo-text" style="margin:12px 30px;">386 <span style="color: #0056b3;">EcoCoin</span></div>
    
    <div class="acesso">
        <h1>Acesse sua conta</h1>
        
        <section class="area-cadastro">
            <div class="redes" style="border-bottom: 1px solid rgb(255, 255, 255); padding-bottom: 20px; ">
                <ul>
                    <li><button id="btn_inicio" class="btn-entrar" style="background-color: white; margin-top: -10px;">Voltar à página inicial</button></li> <!-- colocar como opção login por meio do google -->
                    <li><button id="btn_conta" class="btn-entrar" style="background-color: var(--primary-dark); color: white;">Não tenho conta</button></li> <!-- colocar como opção login por meio do facebook -->
                </ul>
            </div>
            <div id="login" class="cadastrar" style="margin-top: 20px;">
                <ul>
                    <li><input type="email" id="email_login" placeholder="E-mail" required></li>
                    <li><input type="password" id="senha_login" placeholder="Senha" required></li>
                    <li><input id="btn_entrar" type="submit" class="btn-entrar"value="Entrar"></li>
                    <li><input id="esqueci_senha" type="submit" class="btn-entrar" value="Esqueceu a senha?"></li>
                </ul>
            </div>
            <div id="nova_conta" class="cadastrar" style="margin-top: 20px;">
                <ul>
                    <li><input type="nome" id="nome_cadastro" placeholder="Nome" required></li>
                    <li><input type="turma" id="turma_cadastro" placeholder="Turma" required></li>
                    <li><input type="matricula" id="matricula_cadastro" placeholder="Matrícula" required></li>
                    <li><input type="email" id="email_cadastro" placeholder="E-mail" required></li>
                    <li><input type="password" id="senha_cadastro" placeholder="Senha" required></li>
                    <li><input id="btn_cadastrar" type="submit" class="btn-entrar"value="Cadastrar"></li>
                </ul>
            </div>
        </section>
    </div>

</body>
</html>
